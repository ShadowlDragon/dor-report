<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DOR Report</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="layout">
        <div id="report" class="page">
            <div class="header">
            
                <table class="header-table">
                    <tr>
                        <!-- LOGO -->
                        <td class="logo-cell">
                            <img src="logo.jpg" crossorigin="anonymous">
                        </td>
            
                        <!-- TITLE -->
                        <td class="title-cell" contenteditable="true">
                            DAILY OPERATION REPORT PVD II
                        </td>
            
                        <!-- RIGHT INFO -->
                        <td class="info-cell">
                            <table>
                                <tr><td>PVD Doc Ref:</td><td>PVDII/STC</td></tr>
                                <tr><td>Orig. Issue Date:</td><td>17 Oct 11</td></tr>
                                <tr><td>Rev. No:</td><td>01</td></tr>
                                <tr><td>Rev. Date:</td><td>17 Oct 11</td></tr>
                                <tr><td>No of Pages:</td><td>1/3</td></tr>
                            </table>
                        </td>
                    </tr>
                </table>
            
                <!-- BOTTOM -->
                <div class="header-bottom">
                    <table>
                        <tr>
                            <td><b>Rig Name</b></td>
                            <td contenteditable="true">PV Drilling - II</td>
                            <td><b>Date:</b></td>
                            <td id="date"></td>
                        </tr>
                        <tr>
                            <td><b>Total POB</b></td>
                            <td contenteditable="true">POB =120</td>
                            <td><b>Operator</b></td>
                            <td contenteditable="true">PERTAMINA</td>
                        </tr>
                        <tr>
                            <td><b>Current Activities</b></td>
                            <td colspan="3" contenteditable="true">Slick-line on LLA - 2</td>
                        </tr>
                    </table>
                </div>
            
            </div>
        </div>
    
        <!-- FLOAT BUTTON -->
        <div class="controls">
            <button onclick="addRow()">
                <span class="icon">
                    <i class="fa-solid fa-plus"></i>
                </span>
                <span class="label">Add Row</span>
            </button>

            <button onclick="deleteRow()">
                <span class="icon">
                    <i class="fa-solid fa-trash"></i>
                </span>
                <span class="label">Delete Row</span>
            </button>

            <button onclick="clearTable()">
                <span class="icon">
                    <i class="fa-solid fa-broom"></i>
                </span>
                <span class="label">Clear Content</span>
            </button>

            <button onclick="exportPDF()">
                <span class="icon">
                    <i class="fa-solid fa-file-pdf"></i>
                </span>
                <span class="label">Export to PDF</span>
            </button>
        </div>
    </div>
    

    <script src="script.js"></script>
</body>
</html>
